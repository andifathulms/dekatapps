upstream backend { server backend:8000; }
upstream frontend { server frontend:80; }
upstream minio { server minio:9000; }

# HTTP → HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name dekatapps.online www.dekatapps.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name dekatapps.online www.dekatapps.online;

    ssl_certificate     /etc/letsencrypt/live/dekatapps.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dekatapps.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /media/ {
        proxy_pass http://minio/dekat-media/;
        proxy_set_header Host minio;
    }

    location /static/ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
